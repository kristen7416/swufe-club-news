<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWUFE 社团活动</title>
  <meta name="description" content="西南财经大学社团活动资讯聚合平台 - 一站式查看全校社团活动">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="preload" href="data/activities.json" as="fetch" crossorigin="anonymous">
  <link rel="preload" href="data/clubs.json" as="fetch" crossorigin="anonymous">
</head>
<body>
  <!-- 背景渐变装饰 -->
  <div class="bg-decoration" aria-hidden="true">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- 顶部导航 (固定高度) -->
  <header class="app-header">
    <div class="header-inner">
      <a href="/" class="logo-link">
        <span class="logo-text"><em class="logo-swoosh">SWUFE</em> 社团活动资讯</span>
      </a>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="search" id="searchInput" placeholder="搜索活动或社团..." aria-label="搜索">
      </div>
    </div>
  </header>

  <!-- 主体: 上下分割 -->
  <main class="main-container">
    <!-- ===== 顶部区域 25% → 15% ===== -->
    <div class="top-section" id="topSection">
      <!-- Hero -->
      <section class="hero-section">
        <h2 class="hero-title">社团活动 · 一览无余</h2>
      </section>

      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="toolbar-row">
          <nav class="categories" id="categoryNav" aria-label="活动分类">
            <button class="category-btn active" data-category="all">全部</button>
            <button class="category-btn" data-category="学术科技">学术科技</button>
            <button class="category-btn" data-category="文化艺术">文化艺术</button>
            <button class="category-btn" data-category="体育竞技">体育竞技</button>
            <button class="category-btn" data-category="志愿服务">志愿服务</button>
            <button class="category-btn" data-category="创新创业">创新创业</button>
            <button class="category-btn" data-category="其他">其他</button>
          </nav>

          <div class="status-tabs" id="statusTabs" role="tablist">
            <button class="status-btn active" data-status="all">全部</button>
            <button class="status-btn" data-status="upcoming">即将开始</button>
            <button class="status-btn" data-status="ongoing">进行中</button>
            <button class="status-btn" data-status="ended">已结束</button>
          </div>
        </div>
      </div>

    </div>

    <!-- ===== 卡片区域 75% → 85% (内部滚动) ===== -->
    <div class="cards-section" id="cardsSection">
      <!-- 加载提示 -->
      <div id="loadingIndicator" class="loading-indicator" role="status">
        <div class="loading-spinner"></div>
        <span class="loading-text">加载中...</span>
      </div>

      <!-- 活动网格 -->
      <section class="activity-grid" id="activityGrid" aria-label="活动列表"></section>

      <!-- 加载更多 -->
      <div class="load-more" id="loadMore">
        <button class="load-more-btn">加载更多</button>
      </div>

      <!-- 底部 -->
      <footer class="app-footer">
        <div class="footer-inner">
          <p>
            <span>数据来源：各社团微信公众号</span>
            <span class="footer-sep">|</span>
            <span>更新于 <span id="lastUpdated"></span></span>
            <span class="footer-sep">|</span>
            <a href="https://github.com/kristen7416/swufe-club-news" target="_blank" rel="noopener">GitHub</a>
          </p>
          <p class="footer-sub">社团信息持续收集中 · 如需收录或修正请联系我们</p>
          <p class="footer-sub" style="margin-top:6px;font-size:11px">
            访客 <span id="busuanzi_value_site_uv"></span> ·
            浏览 <span id="busuanzi_value_site_pv"></span>
          </p>
        </div>
      </footer>
    </div>
  </main>

  <!-- 活动详情弹窗 -->
  <div class="dialog-overlay" id="activityDialog" role="dialog" aria-modal="true">
    <div class="dialog-panel">
      <div class="dialog-header">
        <h2 class="dialog-title" id="dialogTitle"></h2>
        <button class="dialog-close" id="closeDialog" aria-label="关闭">✕</button>
      </div>
      <div class="dialog-body" id="dialogBody"></div>
      <div class="dialog-footer" id="dialogFooter"></div>
    </div>
  </div>

  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
