name: 爬虫 + 部署

on:
  push:
    branches: [main]
  schedule:
    # 每 2 小时执行一次 (北京时间 8:00 - 23:00)
    - cron: '0 0-15/2 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: [self-hosted, windows]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml markdownify httpx

      - name: 运行爬虫
        env:
          WECHAT_COOKIE: ${{ secrets.WECHAT_COOKIE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        shell: powershell
        run: |
          cd ${{ github.workspace }}
          python scripts/crawl_wechat.py
          python scripts/extract_activity.py
          python scripts/merge_data.py

      - name: 提交数据更新
        shell: powershell
        run: |
          git config user.name "swufe-bot"
          git config user.email "bot@swufe-club-news.github.io"
          git add site/data/
          # 检查是否有变更
          $diff = git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
            echo "数据无变更，跳过提交"
          } else {
            $date = Get-Date -Format "yyyy-MM-dd HH:mm"
            git commit -m "auto: 更新活动数据 $date UTC"
            git push
          }

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    if: always()  # 即使爬虫部分失败也尝试部署
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传站点文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
